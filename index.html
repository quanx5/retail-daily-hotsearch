<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零售行业每日热搜 - 行业趋势洞察</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0a2463;
            --secondary-color: #3e92cc;
            --accent-color: #1e3a5f;
            --highlight-color: #ff6b35;
            --success-color: #06d6a0;
            --text-primary: #ffffff;
            --text-secondary: #b8c5d6;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-hover: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 50%, var(--accent-color) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 20px 30px;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
            position: relative;
        }

        .header-badge {
            display: inline-block;
            padding: 6px 16px;
            background: var(--highlight-color);
            color: white;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, var(--success-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .date-display {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-out;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--highlight-color), #ff8c61);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: var(--card-hover);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--card-bg);
            border-top-color: var(--highlight-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        #captureArea {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 50%, var(--accent-color) 100%);
            padding: 20px;
            border-radius: 20px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            animation: fadeInUp 0.6s ease-out backwards;
            position: relative;
            overflow: hidden;
        }

        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--highlight-color), var(--success-color));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .news-card:hover {
            background: var(--card-hover);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.2);
        }

        .news-card:hover::before {
            transform: scaleX(1);
        }

        .news-rank {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, var(--highlight-color), #ff8c61);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 2px 10px rgba(255, 107, 53, 0.3);
        }

        .news-category {
            display: inline-block;
            padding: 4px 12px;
            background: var(--success-color);
            color: white;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .news-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
            color: var(--text-primary);
            padding-right: 40px;
        }

        .news-description {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .news-source {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .news-hot {
            color: var(--highlight-color);
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .watermark {
            margin-top: 10px;
            opacity: 0.6;
            font-size: 0.85rem;
        }

        /* 分享提示 */
        .share-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1rem;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .share-toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .news-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .news-card {
                padding: 20px;
            }

            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                justify-content: center;
            }
        }

        /* 添加卡片序号动画延迟 */
        .news-card:nth-child(1) { animation-delay: 0.1s; }
        .news-card:nth-child(2) { animation-delay: 0.2s; }
        .news-card:nth-child(3) { animation-delay: 0.3s; }
        .news-card:nth-child(4) { animation-delay: 0.4s; }
        .news-card:nth-child(5) { animation-delay: 0.5s; }
        .news-card:nth-child(6) { animation-delay: 0.6s; }
        .news-card:nth-child(7) { animation-delay: 0.7s; }
        .news-card:nth-child(8) { animation-delay: 0.8s; }
        .news-card:nth-child(9) { animation-delay: 0.9s; }
        .news-card:nth-child(10) { animation-delay: 1s; }
    </style>
</head>
<body>
    <div class="container">
        <div id="captureArea">
            <header>
                <div class="header-badge">RETAIL TRENDS</div>
                <h1>零售行业每日热搜</h1>
                <p class="subtitle">行业趋势洞察 · 数据驱动决策</p>
                <div class="date-display" id="currentDate"></div>
            </header>

            <div id="newsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载今日热搜...</p>
                </div>
            </div>

            <footer>
                <p>数据每日自动更新 · 助力零售决策</p>
                <p class="watermark">零售行业热搜榜 · 专业版</p>
            </footer>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" onclick="shareAsImage()">
                <span>📸</span> 生成分享图片
            </button>
            <button class="btn btn-secondary" onclick="refreshData()">
                <span>🔄</span> 刷新数据
            </button>
        </div>
    </div>

    <div class="share-toast" id="shareToast">正在生成图片...</div>

    <script>
        // 显示当前日期
        function displayCurrentDate() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            };
            document.getElementById('currentDate').textContent = 
                now.toLocaleDateString('zh-CN', options);
        }

        // 获取零售行业分类
        function getCategory(index) {
            const categories = ['新零售', '电商', '消费趋势', '品牌动态', '市场洞察', '行业报告', '技术创新', '用户体验'];
            return categories[index % categories.length];
        }

        // 格式化时间
        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            
            if (diff < 60) return `${diff}分钟前`;
            if (diff < 1440) return `${Math.floor(diff / 60)}小时前`;
            return date.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
        }

        // 生成热度值
        function getHotValue() {
            return (Math.random() * 50000 + 10000).toFixed(0);
        }

        // 创建新闻卡片
        function createNewsCard(news, index) {
            return `
                <div class="news-card" onclick="window.open('${news.url}', '_blank')">
                    <div class="news-rank">${index + 1}</div>
                    <span class="news-category">${getCategory(index)}</span>
                    <h3 class="news-title">${news.title}</h3>
                    <p class="news-description">${news.description || news.title}</p>
                    <div class="news-meta">
                        <span class="news-source">📊 ${news.source || '行业资讯'}</span>
                        <span class="news-hot">🔥 ${getHotValue()}</span>
                    </div>
                </div>
            `;
        }

        // 获取零售行业热搜数据
        function getRetailNews() {
            const now = new Date();
            return [
                {
                    title: '直播电商GMV突破新高，品牌自播成主流趋势',
                    description: '2026年Q1直播电商交易额同比增长65%，品牌自播占比超过40%，头部品牌纷纷加码自播团队建设，私域流量运营成为核心竞争力。',
                    source: '电商观察',
                    publishedAt: new Date(now - 30 * 60000).toISOString(),
                    url: '#'
                },
                {
                    title: '即时零售订单量激增，30分钟达成为标配',
                    description: '美团、饿了么等平台即时零售业务增长迅猛，消费者对配送时效要求不断提升，零售商加速布局前置仓和社区店。',
                    source: '零售前沿',
                    publishedAt: new Date(now - 90 * 60000).toISOString(),
                    url: '#'
                },
                {
                    title: 'AI智能导购系统落地，转化率提升30%',
                    description: '多家头部零售企业引入AI导购系统，通过智能推荐和个性化服务，显著提升用户购物体验和转化效率。',
                    source: '科技零售',
                    publishedAt: new Date(now - 150 * 60000).toISOString(),
                    url: '#'
                },
                {
                    title: '新消费品牌集体出海，东南亚市场成热门',
                    description: '国内新消费品牌加速国际化布局，东南亚、中东等新兴市场成为重点，跨境电商平台助力品牌快速拓展海外业务。',
                    source: '品牌观察',
                    publishedAt: new Date(now - 210 * 60000).toISOString(),
                    url: '#'
                },
                {
                    title: '会员制零售模式火热，付费会员突破5000万',
                    description: '山姆、Costco等会员制商超持续扩张，本土零售企业纷纷推出付费会员体系，会员经济成为零售新增长点。',
                    source: '商业周刊',
                    publishedAt: new Date(now - 270 * 60000).toISOString(),
                    url: '#'
                },
                {
                    title: '绿色消费成趋势，可持续产品销量翻倍',
                    description: '消费者环保意识增强，可持续、环保产品需求激增，品牌ESG表现成为影响购买决策的重要因素。',
                    source: '消费日报',
                    publishedAt: new Date(now - 330 * 60000).toISOString(),
                    url: '#'
                },
                {
                    title: '社区团购重新洗牌，精细化运营成关键',
                    description: '社区团购行业进入理性发展阶段，企业从规模扩张转向精细化运营，供应链效率和用户留存成为核心指标。',
                    source: '零售内参',
                    publishedAt: new Date(now - 390 * 60000).toISOString(),
                    url: '#'
                },
                {
                    title: '元宇宙虚拟店铺兴起，Z世代成消费主力',
                    description: '多个品牌在元宇宙平台开设虚拟店铺，通过沉浸式体验吸引年轻消费者，虚拟商品交易额持续增长。',
                    source: '未来零售',
                    publishedAt: new Date(now - 450 * 60000).toISOString(),
                    url: '#'
                },
                {
                    title: '无人零售技术成熟，智能货柜覆盖率提升',
                    description: '无人便利店、智能货柜等无人零售业态技术日趋成熟，运营成本下降，在写字楼、社区等场景快速普及。',
                    source: '智慧商业',
                    publishedAt: new Date(now - 510 * 60000).toISOString(),
                    url: '#'
                },
                {
                    title: '私域流量运营升级，企业微信用户破8亿',
                    description: '零售企业加大私域流量投入，通过企业微信、小程序等工具构建私域生态，实现用户精细化运营和复购提升。',
                    source: '营销观察',
                    publishedAt: new Date(now - 570 * 60000).toISOString(),
                    url: '#'
                }
            ];
        }

        // 渲染新闻列表
        function renderNews(articles) {
            const container = document.getElementById('newsContainer');
            const newsHTML = articles
                .map((article, index) => createNewsCard(article, index))
                .join('');
            
            container.innerHTML = `<div class="news-grid">${newsHTML}</div>`;
        }

        // 显示提示信息
        function showToast(message, duration = 2000) {
            const toast = document.getElementById('shareToast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // 生成分享图片
        async function shareAsImage() {
            showToast('正在生成图片，请稍候...', 3000);
            
            try {
                const captureArea = document.getElementById('captureArea');
                
                // 使用html2canvas生成图片
                const canvas = await html2canvas(captureArea, {
                    backgroundColor: null,
                    scale: 2, // 提高清晰度
                    logging: false,
                    useCORS: true,
                    allowTaint: true
                });
                
                // 转换为图片并下载
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    const date = new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
                    link.download = `零售行业热搜-${date}.png`;
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                    
                    showToast('✅ 图片已保存，可以分享啦！');
                }, 'image/png');
                
            } catch (error) {
                console.error('生成图片失败:', error);
                showToast('❌ 生成失败，请重试');
            }
        }

        // 刷新数据
        function refreshData() {
            showToast('正在刷新数据...');
            init();
        }

        // 初始化页面
        async function init() {
            displayCurrentDate();
            const news = getRetailNews();
            renderNews(news);
        }

        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', init);

        // 每小时自动刷新一次
        setInterval(init, 3600000);
    </script>
</body>
</html>
