name: Deploy and Push Daily Retail Hotsearch

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUSH_CHANNEL: ${{ secrets.PUSH_CHANNEL || 'wecom' }}
  WECOM_BOT_WEBHOOK: ${{ secrets.WECOM_BOT_WEBHOOK }}
  SERVER_CHAN_SENDKEY: ${{ secrets.SERVER_CHAN_SENDKEY }}
  PAGE_URL: ${{ secrets.PAGE_URL }}

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

  daily-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Push retail hotsearch to WeChat
        run: node scripts/generate-and-push.js
